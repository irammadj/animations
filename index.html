<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>animations</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hero">
      <div class="divider">
        <div class="heading">
          <h1>CSS animations</h1>
          <p>Recreate each animation below using CSS.</p>
        </div>
      </div>

      <div class="bounce">
        <div class="title">BOUNCE</div>
        <div class="round-ball"></div>
      </div>

      <div class="spinner">
        <div class="title">SPIN</div>
        <div class="spin-box">
          <div class="spin box1"></div>
          <div class="spin box2"></div>
          <div class="spin box3"></div>
        </div>
      </div>

      <div class="fade">
        <div class="title">FADE IN + SLIDE UP</div>
        <div class="container">
          <div class="word hello">Hello</div>
          <div class="word world">world</div>
          <div class="word mark">!</div>
        </div>
      </div>

      <div class="hava">
        <button class="hava-btn">hover me</button>
      </div>
    </div>
  </body>
</html>
